<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in — User Management</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2064%2064%22%3E%3Cdefs%3E%3ClinearGradient%20id%3D%22g%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%221%22%20y2%3D%221%22%3E%3Cstop%20offset%3D%220%22%20stop-color%3D%22%230d6efd%22/%3E%3Cstop%20offset%3D%221%22%20stop-color%3D%22%236f42c1%22/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect%20width%3D%2264%22%20height%3D%2264%22%20rx%3D%2214%22%20fill%3D%22url%28%23g%29%22/%3E%3Ctext%20x%3D%2232%22%20y%3D%2247%22%20font-family%3D%22Segoe%20UI%2CArial%2Csans-serif%22%20font-size%3D%2242%22%20font-weight%3D%22700%22%20text-anchor%3D%22middle%22%20fill%3D%22%23fff%22%3ET%3C/text%3E%3C/svg%3E" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background-color: #0b0d12;
      overflow: hidden;
      position: relative;
    }
    /* Aurora glow — three drifting radial blobs in the brand palette. */
    body::before {
      content: "";
      position: fixed;
      inset: -25%;
      z-index: -2;
      background:
        radial-gradient(38% 38% at 18% 22%, rgba(13,110,253,.55) 0%, transparent 60%),
        radial-gradient(34% 34% at 82% 26%, rgba(111,66,193,.45) 0%, transparent 60%),
        radial-gradient(42% 42% at 50% 88%, rgba(13,202,240,.30) 0%, transparent 60%);
      filter: blur(40px);
      animation: drift 18s ease-in-out infinite alternate;
    }
    /* Fine grid overlay for depth, fading toward the edges. */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image:
        linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 44px 44px;
      -webkit-mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, #000 40%, transparent 100%);
              mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, #000 40%, transparent 100%);
    }
    @keyframes drift {
      0%   { transform: translate3d(0,0,0) scale(1); }
      50%  { transform: translate3d(2%,-2%,0) scale(1.08); }
      100% { transform: translate3d(-2%,2%,0) scale(1.04); }
    }
    @media (prefers-reduced-motion: reduce) {
      body::before { animation: none; }
    }
    .login-card {
      width: 100%;
      max-width: 380px;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 16px;
      background: rgba(22,25,33,.72);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      box-shadow: 0 20px 60px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.06);
      color: #e9ecef;
    }
    .login-card .form-control, .login-card .input-group-text {
      background: rgba(255,255,255,.04);
      border-color: rgba(255,255,255,.12);
      color: #e9ecef;
    }
    .login-card .form-control:focus {
      background: rgba(255,255,255,.06);
      border-color: #0d6efd;
      box-shadow: 0 0 0 .2rem rgba(13,110,253,.25);
      color: #fff;
    }
    .login-card .form-control::placeholder { color: rgba(233,236,239,.4); }
    .login-card .text-muted { color: rgba(233,236,239,.55) !important; }
    .login-card hr { border-color: rgba(255,255,255,.15); }
    .brand {
      font-weight: 700;
      letter-spacing: .5px;
    }
    .brand-icon {
      width: 54px; height: 54px; border-radius: 14px;
      background: linear-gradient(135deg, #0d6efd, #6f42c1);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; margin: 0 auto 1rem;
      box-shadow: 0 8px 24px rgba(13,110,253,.45);
    }
  </style>
</head>
<body>
  <div class="card login-card p-4">
    <div class="card-body">
      {% if logo_url %}
      <div class="text-center mb-3"><img src="{{ logo_url }}" alt="Logo" style="max-height:56px;max-width:220px;object-fit:contain"></div>
      {% else %}
      <div class="brand-icon"><i class="bi bi-people-fill"></i></div>
      {% endif %}
      <h5 class="text-center brand mb-1">User Management</h5>
      <p class="text-center text-muted small mb-4">Tryzens IT Operations</p>

      {% if error %}
      <div class="alert alert-danger py-2 small">{{ error }}</div>
      {% endif %}

      {% if sso %}
      <a href="{{ url_for('auth_login', next=next) }}" class="btn btn-primary w-100">
        <i class="bi bi-microsoft me-2"></i>Sign in with Microsoft
      </a>
      <p class="text-center text-muted small mt-2 mb-0">Use your organisation account.</p>
      {% endif %}

      {% if sso and local %}
      <div class="d-flex align-items-center my-3 text-muted small">
        <hr class="flex-grow-1 my-0" />
        <span class="px-2">or admin sign-in</span>
        <hr class="flex-grow-1 my-0" />
      </div>
      {% endif %}

      {% if local %}
      <form method="POST" autocomplete="off">
        <div class="mb-3">
          <label class="form-label small fw-semibold">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" {% if not sso %}autofocus{% endif %} required />
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label small fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" required />
          </div>
        </div>
        <button type="submit" class="btn {% if sso %}btn-outline-primary{% else %}btn-primary{% endif %} w-100">
          <i class="bi bi-box-arrow-in-right me-1"></i>Sign in{% if sso %} as admin{% endif %}
        </button>
      </form>
      {% endif %}
    </div>
  </div>
</body>
</html>
